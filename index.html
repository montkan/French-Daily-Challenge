<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Défi Quotidien - 法語學習本地進度管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none; }
            .page-container { 
                box-shadow: none !important; 
                margin: 0 !important;
                width: 210mm;
                height: 297mm;
                padding: 15mm !important;
                border: none !important;
            }
            input[type="text"], textarea { border: none !important; background: transparent !important; }
            @page { size: A4; margin: 0; }
        }
        
        body {
            background-color: #f1f5f9;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-print-color-adjust: exact;
        }

        .page-container {
            background: white;
            width: 210mm;
            height: 297mm;
            margin: 20px auto;
            padding: 20mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .header-title {
            font-family: 'Montserrat', sans-serif;
            color: #0A2342;
        }

        .cb-container {
            display: block;
            position: relative;
            padding-left: 35px;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }

        .cb-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 24px;
            width: 24px;
            background-color: #fff;
            border: 2px solid #1768AC;
            border-radius: 4px;
        }

        .cb-container input:checked ~ .checkmark { background-color: #1768AC; }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }
        .cb-container input:checked ~ .checkmark:after { display: block; }

        .french-quote {
            border-left: 4px solid #FF7B54;
            padding-left: 15px;
            font-style: italic;
        }

        .word-input {
            border: none;
            border-bottom: 1px solid #f1f5f9;
            width: 100%;
            padding: 4px 2px;
            outline: none;
            background: transparent;
            display: block;
            font-size: 13px;
            transition: all 0.2s;
        }
        .word-input:focus { 
            border-bottom: 1.5px solid #1768AC; 
            background-color: #f8fafc; 
        }

        .mood-btn {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .mood-checkbox { display: none; }
        .mood-checkbox:checked + .mood-label {
            border-color: #FF7B54;
            background-color: #fff7ed;
            transform: scale(1.1);
        }

        .stats-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
        }
    </style>
</head>
<body class="p-4">

    <!-- 控制面板 (非列印區域) -->
    <div class="no-print max-w-5xl mx-auto mb-6 flex flex-col gap-4">
        <!-- 統計數據板 -->
        <div class="stats-card p-6 rounded-2xl shadow-xl flex justify-around items-center">
            <div class="text-center">
                <p class="text-gray-400 text-xs uppercase tracking-widest mb-1">累積打卡天數</p>
                <p id="total-days" class="text-4xl font-bold text-orange-400">0</p>
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div class="text-center">
                <p class="text-gray-400 text-xs uppercase tracking-widest mb-1">最近七天完成度</p>
                <div class="flex gap-2 mt-2" id="streak-dots">
                    <!-- 自動生成點點 -->
                </div>
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div class="text-center">
                <p class="text-gray-400 text-xs uppercase tracking-widest mb-1">當前查看日期</p>
                <input type="date" id="date-picker" class="bg-transparent border-b border-gray-500 font-bold text-lg focus:outline-none">
            </div>
        </div>

        <div class="bg-white p-4 rounded-lg border border-slate-200 flex justify-between items-center shadow-sm">
            <div class="flex-1">
                <p class="font-bold text-slate-800">本地存儲模式已啟動 💾</p>
                <p class="text-xs text-slate-500">所有紀錄將保存在您的瀏覽器中，無需聯網即可保存與查看歷史。</p>
            </div>
            <div class="flex space-x-2">
                <div id="save-status" class="hidden text-sm bg-green-100 text-green-700 px-3 py-2 rounded-lg items-center border border-green-200 animate-bounce">
                    ✅ 紀錄已存至本地
                </div>
                <button id="save-btn" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-indigo-700 transition shadow-md">
                    <span>💾 保存今日紀錄</span>
                </button>
                <button onclick="window.print()" class="bg-slate-800 text-white px-5 py-2 rounded-lg font-bold hover:bg-slate-900 transition shadow-md">
                    🖨️ 列印 A4 存檔
                </button>
            </div>
        </div>
    </div>

    <!-- A4 容器 -->
    <div class="page-container" id="printable-area">
        <!-- 頁首 -->
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="header-title text-4xl uppercase tracking-tighter">Mon Défi Quotidien</h1>
                <p class="font-bold tracking-widest mt-1 text-indigo-800">法語每日單詞打卡表</p>
            </div>
            <div class="text-right w-48 border-b-2 border-indigo-900 pb-1">
                <div class="flex justify-end items-center">
                    <span class="text-sm text-gray-400 font-bold mr-2">DATE:</span>
                    <span id="display-date" class="text-xl font-bold text-indigo-900">2024-03-09</span>
                </div>
            </div>
        </div>

        <!-- 每日金句 -->
        <div class="french-quote mb-8">
            <p class="text-xl text-slate-800 italic">"Petit à petit, l'oiseau fait son nid."</p>
            <p class="text-sm text-slate-500">滴水穿石，凡事貴在堅持。</p>
        </div>

        <div class="grid grid-cols-2 gap-8 flex-grow">
            <!-- 左側：單詞區 -->
            <div class="space-y-6">
                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">✍️ 重點單詞 (Mots)</h2>
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] text-gray-400 uppercase">
                                <th class="pb-2 w-2/5">單詞與發音</th>
                                <th class="pb-2 w-3/5">定義與例句</th>
                            </tr>
                        </thead>
                        <tbody id="words-table-body" class="text-sm">
                            <!-- 由 JS 生成 10 行 -->
                        </tbody>
                    </table>
                </section>
            </div>

            <!-- 右側：任務區 -->
            <div class="space-y-8">
                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">✅ 今日任務</h2>
                    <div id="checklist-container" class="space-y-4 pt-2">
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">聽力練習 (15 分鐘)</span>
                            <input type="checkbox" data-task="listening">
                            <span class="checkmark"></span>
                        </label>
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">單詞背誦 (10 個)</span>
                            <input type="checkbox" data-task="vocab">
                            <span class="checkmark"></span>
                        </label>
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">朗讀練習 (5 遍)</span>
                            <input type="checkbox" data-task="reading">
                            <span class="checkmark"></span>
                        </label>
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">課後複習與總結</span>
                            <input type="checkbox" data-task="review">
                            <span class="checkmark"></span>
                        </label>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">📖 語法筆記</h2>
                    <textarea id="grammar-notes" class="w-full h-44 border border-dashed border-gray-300 rounded p-4 text-sm focus:outline-none focus:border-indigo-500 transition" placeholder="在此輸入今日學到的新句型..."></textarea>
                </section>

                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">🌟 今日心情</h2>
                    <div id="mood-selector" class="flex justify-around py-2">
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="happy" class="mood-checkbox">
                            <div class="mood-label w-12 h-12 border-2 border-gray-100 rounded-full flex items-center justify-center text-2xl mb-1">😊</div>
                            <span class="text-[10px]">Satisfait</span>
                        </label>
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="normal" class="mood-checkbox">
                            <div class="mood-label w-12 h-12 border-2 border-gray-100 rounded-full flex items-center justify-center text-2xl mb-1">😐</div>
                            <span class="text-[10px]">Normal</span>
                        </label>
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="sad" class="mood-checkbox">
                            <div class="mood-label w-12 h-12 border-2 border-gray-100 rounded-full flex items-center justify-center text-2xl mb-1">😫</div>
                            <span class="text-[10px]">Difficile</span>
                        </label>
                    </div>
                </section>
            </div>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center text-[10px] text-gray-400">
            <p>© 2024 Mon Défi Quotidien | 本地離線存檔系統</p>
            <div class="flex space-x-2">
                <div class="w-3 h-3 bg-indigo-900"></div>
                <div class="w-3 h-3 bg-indigo-600"></div>
                <div class="w-3 h-3 bg-orange-400"></div>
            </div>
        </div>
    </div>

    <script>
        // 生成單詞輸入行
        const tableBody = document.getElementById('words-table-body');
        for(let i=1; i<=10; i++) {
            tableBody.innerHTML += `
                <tr>
                    <td class="py-2 pr-3 border-b border-gray-100 align-top">
                        <input type="text" class="word-input font-bold text-indigo-900" placeholder="${i}. 單詞" id="word-${i}">
                        <input type="text" class="word-input text-[11px] text-gray-400 italic" placeholder="/發音/" id="pron-${i}">
                    </td>
                    <td class="py-2 border-b border-gray-100 align-top">
                        <textarea class="word-input text-[11px] w-full h-12 overflow-hidden py-1 leading-tight" placeholder="定義或例句..." id="def-${i}"></textarea>
                    </td>
                </tr>
            `;
        }

        // --- 本地存儲邏輯 ---
        const STORAGE_KEY = 'french_study_records';
        let selectedDate = new Date().toISOString().split('T')[0];

        // 取得所有紀錄
        function getAllRecords() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        }

        // 保存目前頁面到 LocalStorage
        function saveToLocal() {
            const records = getAllRecords();
            const currentData = {
                words: {},
                checklist: {},
                notes: document.getElementById('grammar-notes').value,
                mood: document.querySelector('input[name="mood"]:checked')?.value || null,
                lastUpdated: new Date().getTime()
            };

            for(let i=1; i<=10; i++) {
                currentData.words[i] = {
                    w: document.getElementById(`word-${i}`).value,
                    p: document.getElementById(`pron-${i}`).value,
                    d: document.getElementById(`def-${i}`).value
                };
            }

            document.querySelectorAll('input[data-task]').forEach(cb => {
                currentData.checklist[cb.getAttribute('data-task')] = cb.checked;
            });

            records[selectedDate] = currentData;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            
            showSaveFeedback();
            updateStats();
        }

        // 載入特定日期數據
        function loadFromLocal(dateStr) {
            const records = getAllRecords();
            const data = records[dateStr];

            // 重置表單
            document.getElementById('grammar-notes').value = data?.notes || '';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('input[name="mood"]').forEach(rb => rb.checked = false);
            for(let i=1; i<=10; i++) {
                document.getElementById(`word-${i}`).value = data?.words?.[i]?.w || '';
                document.getElementById(`pron-${i}`).value = data?.words?.[i]?.p || '';
                document.getElementById(`def-${i}`).value = data?.words?.[i]?.d || '';
            }

            // 填充
            if (data?.checklist) {
                Object.keys(data.checklist).forEach(k => {
                    const el = document.querySelector(`input[data-task="${k}"]`);
                    if(el) el.checked = data.checklist[k];
                });
            }
            if (data?.mood) {
                const rb = document.querySelector(`input[name="mood"][value="${data.mood}"]`);
                if(rb) rb.checked = true;
            }
        }

        // 更新統計板
        function updateStats() {
            const records = getAllRecords();
            const dates = Object.keys(records);
            
            // 總天數
            document.getElementById('total-days').innerText = dates.length;

            // 最近 7 天進度點
            const streakContainer = document.getElementById('streak-dots');
            streakContainer.innerHTML = '';
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                
                const dot = document.createElement('div');
                const hasData = records[ds];
                dot.className = `w-3 h-3 rounded-full ${hasData ? 'bg-orange-400' : 'bg-gray-700'} transition-all`;
                dot.title = ds;
                streakContainer.appendChild(dot);
            }
        }

        function showSaveFeedback() {
            const status = document.getElementById('save-status');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 3000);
        }

        // 事件監聽
        document.getElementById('date-picker').addEventListener('change', (e) => {
            selectedDate = e.target.value;
            document.getElementById('display-date').innerText = selectedDate;
            loadFromLocal(selectedDate);
        });

        document.getElementById('save-btn').addEventListener('click', saveToLocal);

        // 初始化
        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('date-picker').value = now;
            document.getElementById('display-date').innerText = now;
            selectedDate = now;
            loadFromLocal(now);
            updateStats();
        };
    </script>
</body>
</html>
