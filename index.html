<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Défi Quotidien - Apprentissage du Français</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mon Défi">
    <meta name="application-name" content="Mon Défi">
    <meta name="theme-color" content="#1e293b">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/197/197/197560.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197/197560.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none; }
            .page-container { 
                box-shadow: none !important; 
                margin: 0 !important;
                width: 210mm;
                height: 297mm;
                padding: 12mm !important;
                border: none !important;
            }
            input[type="text"], textarea { border: none !important; background: transparent !important; }
            @page { size: A4; margin: 0; }
        }
        
        body {
            background-color: #f1f5f9;
            font-family: 'Montserrat', 'Noto Sans', sans-serif;
            -webkit-print-color-adjust: exact;
            overscroll-behavior-y: contain;
        }

        .page-container {
            background: white;
            width: 210mm;
            height: 297mm;
            margin: 20px auto;
            padding: 15mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 210mm) {
            .page-container {
                width: 100%;
                height: auto;
                margin: 0;
                padding: 1rem;
                box-shadow: none;
            }
        }

        .header-title { color: #0A2342; }

        .cb-container {
            display: block;
            position: relative;
            padding-left: 35px;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }

        .cb-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 20px;
            width: 20px;
            background-color: #fff;
            border: 2px solid #1768AC;
            border-radius: 4px;
        }

        .cb-container input:checked ~ .checkmark { background-color: #1768AC; }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }
        .cb-container input:checked ~ .checkmark:after { display: block; }

        .french-quote {
            border-left: 4px solid #FF7B54;
            padding-left: 15px;
            font-style: italic;
        }

        .input-underline {
            border: none;
            border-bottom: 1px solid #e2e8f0;
            width: 100%;
            padding: 4px 0;
            outline: none;
            background: transparent;
            transition: all 0.2s;
        }
        .input-underline:focus { border-bottom: 1.5px solid #1768AC; background-color: #f8fafc; }

        .word-cell {
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .mood-btn { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; width: 33%; }
        .mood-checkbox { display: none; }
        .mood-checkbox:checked + .mood-label {
            border-color: #FF7B54;
            background-color: #fff7ed;
            transform: scale(1.05);
        }

        .stats-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="p-0 md:p-4">

    <!-- Modal de Confirmation -->
    <div id="confirm-modal" class="modal no-print">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center">
            <h3 class="text-xl font-bold text-red-600 mb-4">⚠️ Confirmer ?</h3>
            <p class="text-slate-600 mb-6 text-sm">Toutes vos données seront effacées.</p>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 py-2 bg-slate-100 text-slate-700 rounded-lg font-bold">Annuler</button>
                <button onclick="clearAllRecords()" class="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold">Confirmer</button>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="no-print max-w-5xl mx-auto mb-6 flex flex-col gap-4">
        <div class="stats-card p-4 md:p-6 md:rounded-2xl shadow-xl flex justify-around items-center">
            <div class="text-center">
                <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-1">Total</p>
                <p id="total-days" class="text-2xl md:text-4xl font-bold text-orange-400">0</p>
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div class="text-center">
                <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-1">Date</p>
                <input type="date" id="date-picker" class="bg-transparent border-b border-gray-500 font-bold text-base md:text-lg focus:outline-none cursor-pointer">
            </div>
        </div>

        <div class="bg-white p-4 md:rounded-lg border border-slate-200 flex flex-wrap justify-center gap-2 shadow-sm">
            <div id="save-status" class="hidden text-sm bg-green-100 text-green-700 px-3 py-2 rounded-lg items-center border border-green-200">✅ OK</div>
            <button id="save-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 transition text-sm">💾 Sauvegarder</button>
            <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-lg font-bold hover:bg-slate-900 transition text-sm">🖨️ Imprimer</button>
            <button onclick="openModal()" class="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-lg font-bold text-sm">🗑️ Effacer</button>
        </div>
    </div>

    <!-- Page Content -->
    <div class="page-container" id="printable-area">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="header-title text-3xl uppercase tracking-tighter">Mon Défi</h1>
                <p class="font-bold tracking-widest mt-1 text-indigo-800 text-[10px] uppercase">Vocabulaire Quotidien</p>
            </div>
            <div class="text-right border-b-2 border-indigo-900 pb-1">
                <div class="flex justify-end items-center">
                    <span class="text-[9px] text-gray-400 font-bold mr-2 uppercase">Date:</span>
                    <span id="display-date" class="text-lg font-bold text-indigo-900">2024-03-09</span>
                </div>
            </div>
        </div>

        <div class="french-quote mb-6">
            <p class="text-lg text-slate-800 italic">"Petit à petit, l'oiseau fait son nid."</p>
        </div>

        <div class="flex flex-col md:flex-row gap-8 flex-grow overflow-hidden">
            <!-- Words List -->
            <div class="w-full md:w-[58%] flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-3 bg-slate-100 p-2 border-l-4 border-indigo-800">
                    <h2 class="text-xs font-bold uppercase tracking-wider">✍️ Mots & Exemples</h2>
                    <button onclick="resetDailyForm()" class="no-print text-[10px] text-gray-400 hover:text-red-500">Reset ↺</button>
                </div>
                
                <div id="words-container" class="space-y-3 overflow-y-auto pr-1">
                    <!-- JS rows generated here -->
                </div>
            </div>

            <!-- Sidebar -->
            <div class="w-full md:w-[42%] flex flex-col space-y-5">
                <section>
                    <h2 class="text-xs font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-3 uppercase">✅ Checklist</h2>
                    <div class="space-y-1.5 pt-1">
                        <label class="cb-container"><span class="text-gray-700 text-[11px]">Écoute (15 min)</span><input type="checkbox" data-task="listening"><span class="checkmark"></span></label>
                        <label class="cb-container"><span class="text-gray-700 text-[11px]">Vocabulaire (10 mots)</span><input type="checkbox" data-task="vocab"><span class="checkmark"></span></label>
                        <label class="cb-container"><span class="text-gray-700 text-[11px]">Lecture à haute voix</span><input type="checkbox" data-task="reading"><span class="checkmark"></span></label>
                        <label class="cb-container"><span class="text-gray-700 text-[11px]">Révision & Résumé</span><input type="checkbox" data-task="review"><span class="checkmark"></span></label>
                    </div>
                </section>

                <section class="flex flex-col flex-grow">
                    <h2 class="text-xs font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-3 uppercase">📖 Grammaire</h2>
                    <textarea id="grammar-notes" class="w-full flex-grow min-h-[350px] md:min-h-[420px] border border-dashed border-gray-300 rounded p-4 text-[11px] leading-relaxed focus:outline-none focus:border-indigo-500 transition-all" placeholder="Écrivez vos notes de grammaire ici..."></textarea>
                </section>

                <section class="mb-4">
                    <h2 class="text-xs font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-3 uppercase">🌟 Humeur</h2>
                    <div id="mood-selector" class="flex justify-between gap-2">
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="happy" class="mood-checkbox">
                            <div class="mood-label py-2 border-2 border-gray-100 rounded-lg flex flex-col items-center justify-center transition-all">
                                <span class="text-xl mb-1">😊</span>
                                <span class="text-[9px] font-bold text-gray-400 uppercase">Content</span>
                            </div>
                        </label>
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="normal" class="mood-checkbox">
                            <div class="mood-label py-2 border-2 border-gray-100 rounded-lg flex flex-col items-center justify-center transition-all">
                                <span class="text-xl mb-1">😐</span>
                                <span class="text-[9px] font-bold text-gray-400 uppercase">Neutre</span>
                            </div>
                        </label>
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="sad" class="mood-checkbox">
                            <div class="mood-label py-2 border-2 border-gray-100 rounded-lg flex flex-col items-center justify-center transition-all">
                                <span class="text-xl mb-1">😫</span>
                                <span class="text-[9px] font-bold text-gray-400 uppercase">Épuisé</span>
                            </div>
                        </label>
                    </div>
                </section>
            </div>
        </div>

        <div class="mt-2 pt-3 border-t border-gray-100 flex justify-between items-center text-[8px] text-gray-400">
            <p>Mon Défi Quotidien • Apprendre le Français</p>
            <div class="flex space-x-1">
                <div class="w-2 h-2 bg-indigo-900"></div><div class="w-2 h-2 bg-indigo-600"></div><div class="w-2 h-2 bg-orange-400"></div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('words-container');
        for(let i=1; i<=10; i++) {
            container.innerHTML += `
                <div class="word-cell">
                    <input type="text" class="input-underline font-bold text-indigo-900 text-sm mb-1" placeholder="${i}. Mot" id="word-${i}">
                    <textarea class="input-underline text-[10px] w-full h-10 resize-none leading-relaxed" placeholder="Définition et exemple détaillé..." id="def-${i}"></textarea>
                </div>
            `;
        }

        const STORAGE_KEY = 'french_study_records';
        let selectedDate = new Date().toISOString().split('T')[0];

        function getAllRecords() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        }

        function saveToLocal() {
            const records = getAllRecords();
            const currentData = {
                words: {}, checklist: {},
                notes: document.getElementById('grammar-notes').value,
                mood: document.querySelector('input[name="mood"]:checked')?.value || null,
                lastUpdated: new Date().getTime()
            };

            for(let i=1; i<=10; i++) {
                currentData.words[i] = {
                    w: document.getElementById(`word-${i}`).value,
                    d: document.getElementById(`def-${i}`).value
                };
            }

            document.querySelectorAll('input[data-task]').forEach(cb => {
                currentData.checklist[cb.getAttribute('data-task')] = cb.checked;
            });

            records[selectedDate] = currentData;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            showSaveFeedback();
            updateStats();
        }

        function loadFromLocal(dateStr) {
            const records = getAllRecords();
            const data = records[dateStr];
            applyDataToUI(data);
        }

        function applyDataToUI(data) {
            document.getElementById('grammar-notes').value = data?.notes || '';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('input[name="mood"]').forEach(rb => rb.checked = false);
            for(let i=1; i<=10; i++) {
                document.getElementById(`word-${i}`).value = data?.words?.[i]?.w || '';
                document.getElementById(`def-${i}`).value = data?.words?.[i]?.d || '';
            }
            if (data?.checklist) {
                Object.keys(data.checklist).forEach(k => {
                    const el = document.querySelector(`input[data-task="${k}"]`);
                    if(el) el.checked = data.checklist[k];
                });
            }
            if (data?.mood) {
                const rb = document.querySelector(`input[name="mood"][value="${data.mood}"]`);
                if(rb) rb.checked = true;
            }
        }

        function resetDailyForm() {
            if(confirm("Effacer les entrées ?")) applyDataToUI(null);
        }

        function openModal() { document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }

        function clearAllRecords() {
            localStorage.removeItem(STORAGE_KEY);
            closeModal();
            loadFromLocal(selectedDate);
            updateStats();
        }

        function updateStats() {
            const records = getAllRecords();
            document.getElementById('total-days').innerText = Object.keys(records).length;
        }

        function showSaveFeedback() {
            const status = document.getElementById('save-status');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 2000);
        }

        document.getElementById('date-picker').addEventListener('change', (e) => {
            selectedDate = e.target.value;
            document.getElementById('display-date').innerText = selectedDate;
            loadFromLocal(selectedDate);
        });

        document.getElementById('save-btn').addEventListener('click', saveToLocal);

        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('date-picker').value = now;
            document.getElementById('display-date').innerText = now;
            selectedDate = now;
            loadFromLocal(now);
            updateStats();
        };
    </script>
</body>
</html>
