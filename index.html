<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Défi Français</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #ecf0f1; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; position: relative; }
        .day.done { background: #2ecc71; color: white; }
        .day.done::after { content: '✔'; position: absolute; font-size: 10px; bottom: 2px; right: 2px; }
        .stats { margin-top: 20px; text-align: center; color: #7f8c8d; }
        button { width: 100%; padding: 10px; margin-top: 20px; border: none; background: #3498db; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">🇫🇷 法语打卡挑战</h1>
    <div id="stats" class="stats">本月已坚持: 0 天</div>
    <div class="grid" id="calendarGrid"></div>
    <button onclick="resetCalendar()">重置本月记录</button>
</div>

<script>
    const grid = document.getElementById('calendarGrid');
    const stats = document.getElementById('stats');
    const daysInMonth = 31; // 简单起见设为31天

    // 从本地存储读取数据
    let checkInData = JSON.parse(localStorage.getItem('frenchCheckIn')) || [];

    function render() {
        grid.innerHTML = '';
        let count = 0;
        for (let i = 1; i <= daysInMonth; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.classList.add('day');
            dayDiv.innerText = i;
            if (checkInData.includes(i)) {
                dayDiv.classList.add('done');
                count++;
            }
            dayDiv.onclick = () => toggleDay(i);
            grid.appendChild(dayDiv);
        }
        stats.innerText = `本月已坚持: ${count} 天`;
        localStorage.setItem('frenchCheckIn', JSON.stringify(checkInData));
    }

    function toggleDay(day) {
        const index = checkInData.indexOf(day);
        if (index > -1) {
            checkInData.splice(index, 1);
        } else {
            checkInData.push(day);
        }
        render();
    }

    function resetCalendar() {
        if(confirm('确定要清空本月记录吗？')) {
            checkInData = [];
            render();
        }
    }

    render();
</script>
</body>
</html>
