<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Défi Quotidien - A4 打卡表 (編輯功能強化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none; }
            .page-container { 
                box-shadow: none !important; 
                margin: 0 !important;
                width: 210mm;
                height: 297mm;
                padding: 15mm !important;
                border: none !important;
            }
            input[type="text"], textarea { border: none !important; background: transparent !important; }
            @page { size: A4; margin: 0; }
        }
        
        body {
            background-color: #f1f5f9;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-print-color-adjust: exact;
        }

        .page-container {
            background: white;
            width: 210mm;
            height: 297mm;
            margin: 20px auto;
            padding: 20mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .header-title {
            font-family: 'Montserrat', sans-serif;
            color: #0A2342;
        }

        .dotted-line-input {
            border: none;
            border-bottom: 2px dotted #cbd5e1;
            width: 100%;
            outline: none;
            padding-left: 5px;
        }

        .cb-container {
            display: block;
            position: relative;
            padding-left: 35px;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }

        .cb-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 24px;
            width: 24px;
            background-color: #fff;
            border: 2px solid #1768AC;
            border-radius: 4px;
        }

        .cb-container input:checked ~ .checkmark { background-color: #1768AC; }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }
        .cb-container input:checked ~ .checkmark:after { display: block; }

        .french-quote {
            border-left: 4px solid #FF7B54;
            padding-left: 15px;
            font-style: italic;
        }

        /* 強化輸入框的可編輯性 */
        .word-input {
            border: none;
            border-bottom: 1px solid #f1f5f9;
            width: 100%;
            padding: 6px 4px;
            outline: none;
            background: transparent;
            display: block;
            position: relative;
            z-index: 10;
        }
        .word-input:focus { 
            border-bottom: 2px solid #1768AC; 
            background-color: #f8fafc; 
        }

        .mood-btn {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .mood-checkbox { display: none; }
        .mood-checkbox:checked + .mood-label {
            border-color: #FF7B54;
            background-color: #fff7ed;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="p-4">

    <div class="no-print max-w-4xl mx-auto mb-6 bg-blue-50 p-4 rounded-lg border border-blue-200 text-blue-800 flex justify-between items-center shadow-sm">
        <div class="flex-1">
            <p class="font-bold flex items-center">📝 編輯提示：</p>
            <p class="text-xs mt-1 italic text-slate-600">左側單詞表已優化，直接點擊下方藍色字體或虛線處即可開始打字。系統會即時保存。</p>
        </div>
        <div class="flex space-x-2">
            <div id="save-status" class="hidden text-sm bg-green-100 text-green-700 px-3 py-2 rounded-lg items-center border border-green-200">
                ✅ 已成功保存！
            </div>
            <button id="save-btn" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-indigo-700 transition shadow-md flex items-center">
                <span id="save-text">💾 完成並保存進度</span>
            </button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
                🖨️ 列印 / PDF
            </button>
        </div>
    </div>

    <!-- A4 容器 -->
    <div class="page-container" id="printable-area">
        
        <!-- 頁首 -->
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="header-title text-4xl uppercase tracking-tighter">Mon Défi Quotidien</h1>
                <p class="font-bold tracking-widest mt-1 text-indigo-800">法語每日單詞打卡表</p>
            </div>
            <div class="text-right w-48">
                <div class="flex items-center mb-2">
                    <span class="text-sm text-gray-500 font-bold">DATE:</span>
                    <input type="text" id="study-date" class="dotted-line-input ml-2 text-center local-save" placeholder="202X-XX-XX">
                </div>
            </div>
        </div>

        <!-- 每日金句 -->
        <div class="french-quote mb-8">
            <p class="text-xl text-slate-800 italic">"Petit à petit, l'oiseau fait son nid."</p>
            <p class="text-sm text-slate-500">滴水穿石，凡事貴在堅持。</p>
        </div>

        <div class="grid grid-cols-2 gap-8 flex-grow">
            <!-- 左側：單詞區 -->
            <div class="space-y-6">
                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">
                        ✍️ 重點單詞 (Mots)
                    </h2>
                    <table class="w-full text-left table-fixed">
                        <thead>
                            <tr class="text-xs text-gray-400 uppercase">
                                <th class="pb-2 w-[45%]">單詞與發音</th>
                                <th class="pb-2 w-[55%]">定義與例句</th>
                            </tr>
                        </thead>
                        <tbody id="words-table-body" class="text-sm">
                            <!-- JS 動態生成 -->
                        </tbody>
                    </table>
                </section>
            </div>

            <!-- 右側：任務區 -->
            <div class="space-y-8">
                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">✅ 今日任務</h2>
                    <div id="checklist-container" class="space-y-4 pt-2">
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">聽力練習 (15 分鐘)</span>
                            <input type="checkbox" data-task="listening" class="local-save-cb">
                            <span class="checkmark"></span>
                        </label>
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">單詞背誦 (10 個)</span>
                            <input type="checkbox" data-task="vocab" class="local-save-cb">
                            <span class="checkmark"></span>
                        </label>
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">朗讀練習 (5 遍)</span>
                            <input type="checkbox" data-task="reading" class="local-save-cb">
                            <span class="checkmark"></span>
                        </label>
                        <label class="cb-container">
                            <span class="text-gray-700 text-sm">課後複習與總結</span>
                            <input type="checkbox" data-task="review" class="local-save-cb">
                            <span class="checkmark"></span>
                        </label>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">📖 語法筆記</h2>
                    <textarea id="grammar-notes" class="w-full h-44 border border-dashed border-gray-300 rounded p-4 text-sm focus:outline-none focus:border-indigo-500 transition local-save" placeholder="在此輸入今日學到的新句型..."></textarea>
                </section>

                <section>
                    <h2 class="text-lg font-bold bg-slate-100 p-2 border-l-4 border-indigo-800 mb-4">🌟 今日心情</h2>
                    <div id="mood-selector" class="flex justify-around py-2">
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="happy" class="mood-checkbox local-save-radio">
                            <div class="mood-label w-12 h-12 border-2 border-gray-100 rounded-full flex items-center justify-center text-2xl mb-1 cursor-pointer">😊</div>
                            <span class="text-[10px]">Satisfait</span>
                        </label>
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="normal" class="mood-checkbox local-save-radio">
                            <div class="mood-label w-12 h-12 border-2 border-gray-100 rounded-full flex items-center justify-center text-2xl mb-1 cursor-pointer">😐</div>
                            <span class="text-[10px]">Normal</span>
                        </label>
                        <label class="text-center mood-btn">
                            <input type="radio" name="mood" value="sad" class="mood-checkbox local-save-radio">
                            <div class="mood-label w-12 h-12 border-2 border-gray-100 rounded-full flex items-center justify-center text-2xl mb-1 cursor-pointer">😫</div>
                            <span class="text-[10px]">Difficile</span>
                        </label>
                    </div>
                </section>
            </div>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center text-[10px] text-gray-400">
            <p>© 2024 Mon Défi Quotidien | 自動備份已啟動</p>
            <div class="flex space-x-2">
                <div class="w-3 h-3 bg-indigo-900"></div>
                <div class="w-3 h-3 bg-indigo-600"></div>
                <div class="w-3 h-3 bg-orange-400"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'french-study-tracker';

        let currentUser = null;
        const LOCAL_KEY = `fr_cache_${appId}`;

        // 動態生成表格
        const tableBody = document.getElementById('words-table-body');
        for(let i=1; i<=10; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="py-2 pr-3 border-b border-gray-100 align-top">
                    <input type="text" class="word-input font-bold text-indigo-900 local-save" placeholder="${i}. 單詞" id="word-${i}">
                    <input type="text" class="word-input text-xs text-gray-400 italic local-save" placeholder="/發音/" id="pron-${i}">
                </td>
                <td class="py-2 border-b border-gray-100 align-top">
                    <textarea class="word-input text-xs w-full h-14 local-save overflow-hidden" placeholder="定義或例句..." id="def-${i}"></textarea>
                </td>
            `;
            tableBody.appendChild(row);
        }

        function collectData() {
            const data = {
                date: document.getElementById('study-date').value,
                words: {},
                checklist: {},
                notes: document.getElementById('grammar-notes').value,
                mood: document.querySelector('input[name="mood"]:checked')?.value || null,
                timestamp: Date.now()
            };
            for(let i=1; i<=10; i++) {
                data.words[i] = {
                    w: document.getElementById(`word-${i}`).value,
                    p: document.getElementById(`pron-${i}`).value,
                    d: document.getElementById(`def-${i}`).value
                };
            }
            document.querySelectorAll('input[data-task]').forEach(cb => {
                data.checklist[cb.getAttribute('data-task')] = cb.checked;
            });
            return data;
        }

        function saveToLocal() {
            localStorage.setItem(LOCAL_KEY, JSON.stringify(collectData()));
        }

        function applyData(data) {
            if (!data) return;
            if (data.date) document.getElementById('study-date').value = data.date;
            if (data.words) {
                for(let i=1; i<=10; i++) {
                    const item = data.words[i];
                    if (item) {
                        document.getElementById(`word-${i}`).value = item.w || '';
                        document.getElementById(`pron-${i}`).value = item.p || '';
                        document.getElementById(`def-${i}`).value = item.d || '';
                    }
                }
            }
            if (data.checklist) {
                Object.keys(data.checklist).forEach(k => {
                    const el = document.querySelector(`input[data-task="${k}"]`);
                    if(el) el.checked = data.checklist[k];
                });
            }
            if (data.notes) document.getElementById('grammar-notes').value = data.notes;
            if (data.mood) {
                const rb = document.querySelector(`input[name="mood"][value="${data.mood}"]`);
                if(rb) rb.checked = true;
            }
        }

        // 監聽所有輸入
        document.body.addEventListener('input', (e) => {
            if (e.target.classList.contains('local-save') || e.target.closest('.local-save-cb') || e.target.name === 'mood') {
                saveToLocal();
            }
        });

        // Firebase Auth
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const local = localStorage.getItem(LOCAL_KEY);
                if (local) applyData(JSON.parse(local));
                
                // 雲端同步
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'current'));
                if (snap.exists()) {
                    const cloud = snap.data();
                    const localTime = local ? JSON.parse(local).timestamp : 0;
                    if (cloud.timestamp > localTime) {
                        applyData(cloud);
                        saveToLocal();
                    }
                }
            }
        });
        initAuth();

        // 雲端保存按鈕
        const saveBtn = document.getElementById('save-btn');
        saveBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            saveBtn.disabled = true;
            document.getElementById('save-text').innerText = "正在保存...";
            
            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'current'), collectData());
                document.getElementById('save-status').classList.remove('hidden');
                setTimeout(() => document.getElementById('save-status').classList.add('hidden'), 3000);
            } catch (e) { console.error(e); }
            
            saveBtn.disabled = false;
            document.getElementById('save-text').innerText = "💾 完成並保存進度";
        });
    </script>
</body>
</html>
